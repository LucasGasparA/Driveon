services:
  db:
    image: postgres:16-alpine
    container_name: driveon-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: driveon
      POSTGRES_USER: driveon
      POSTGRES_PASSWORD: driveon
    ports:
      - "5432:5432"
    volumes:
      - driveon-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driveon -d driveon"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./Back
      dockerfile: Dockerfile
    container_name: driveon-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://driveon:driveon@db:5432/driveon?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 4000
    ports:
      - "4000:4000"

  web:
    build:
      context: ./Front
      dockerfile: Dockerfile
    container_name: driveon-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_URL: http://localhost:4000/api
    ports:
      - "8080:80"

volumes:
  driveon-postgres:
